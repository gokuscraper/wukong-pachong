
name: Goku-Cleanup
on: workflow_dispatch

# 第一步：显式开启“写入”权限，否则会报 403
permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 这里一定要带上授权，否则后面的 push 会失败
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Tools
        run: pip install git-filter-repo

      - name: Surgery
        run: |
          git config user.name "Goku-Scraper"
          git config user.email "contact@gokuscraper.com"
          git filter-repo --email-callback '
            return b"contact@gokuscraper.com" if email == b"2759866098@qq.com" else email
          ' --force

      - name: Force Push
        run: |
          # 重新关联远程仓库，利用机器人自带的临时令牌
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin --force --all
